name: Bug Report
description: Report a problem with codeplaybook
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Run `npx codeplaybook --version`
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Coding Agent
      options:
        - Claude Code
        - Cursor
        - GitHub Copilot
        - Other
    validations:
      required: true
