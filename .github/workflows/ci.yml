name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: CLI version
        run: node bin/cli.js --version

      - name: CLI help
        run: node bin/cli.js help

      - name: Verify content completeness
        run: |
          test -f blueprints/hexagonal.md
          test -f blueprints/clean-architecture.md
          test -f blueprints/feature-slices.md
          test -f blueprints/frontend-component-architecture.md
          echo "Blueprints: 4 files OK"

          test -f analyses/code-scaffolding.md
          test -f analyses/architecture-boundaries.md
          test -f analyses/testing-practices.md
          test -f analyses/dev-workflow.md
          test -f analyses/error-handling.md
          test -f analyses/import-patterns.md
          echo "Analyses: 6 files OK"

          test -f workflows/onboard.md
          test -f workflows/sync.md
          test -f workflows/audit.md
          echo "Workflows: 3 files OK"

      - name: Verify dashboard exists
        run: test -f dashboard/index.html && echo "Dashboard: OK"
