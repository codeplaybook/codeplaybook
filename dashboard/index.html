<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>codeplaybook · dashboard</title>
<link rel="stylesheet" href="design-system.css">
<style>
html, body, #root { height: 100%; }
body {
  background: var(--cp-bg);
  background-attachment: fixed;
  overflow: hidden;
}

/* ===== App shell ===== */
.app { height: 100vh; display: grid; grid-template-rows: 1fr; }

/* ===== Body grid ===== */
.body {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: 100%;
  min-height: 0;
}

/* ===== Repo sidebar ===== */
.repos {
  border-right: 1px solid var(--cp-border);
  background: var(--cp-bg-elev-1);
  display: flex; flex-direction: column;
  min-height: 0;
}
.repos__hd {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--cp-border);
  display: flex; flex-direction: column; gap: 10px;
}
.repos__title {
  display: flex; align-items: center; justify-content: space-between;
}
.repos__title h2 {
  font-family: var(--cp-font-sans);
  font-size: 13px; font-weight: 600;
  letter-spacing: -0.02em; color: var(--cp-fg);
  margin: 0;
  display: inline-flex; align-items: center; gap: 6px;
}
.repos__title h2 .count {
  font-family: var(--cp-font-mono);
  font-size: 11px; font-weight: 400; color: var(--cp-fg-3);
  letter-spacing: -0.02em;
}
.repos__filter {
  display: flex; align-items: center;
  background: var(--cp-bg-inset);
  border: 1px solid var(--cp-border);
  border-radius: 4px;
  padding: 4px 10px;
  font-family: var(--cp-font-mono); font-size: 12px;
  letter-spacing: -0.02em;
  gap: 6px;
}
.repos__filter input {
  background: transparent; border: 0; color: var(--cp-fg);
  font: inherit; outline: none; flex: 1; letter-spacing: -0.02em;
}
.repos__filter input::placeholder { color: var(--cp-fg-4); }
.repos__filter .x {
  font-family: var(--cp-font-mono); font-size: 11px;
  color: var(--cp-fg-3); cursor: pointer;
  padding: 1px 4px; border-radius: 3px;
}
.repos__filter .x:hover { background: var(--cp-bg-elev-2); color: var(--cp-fg); }
.repos__sort {
  display: flex; gap: 4px;
  font-family: var(--cp-font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--cp-fg-3);
}
.repos__sort button {
  background: transparent; border: 0;
  color: var(--cp-fg-3); padding: 3px 7px;
  border-radius: 3px; cursor: pointer;
  font: inherit; text-transform: uppercase; letter-spacing: 0.04em;
}
.repos__sort button:hover { color: var(--cp-fg); }
.repos__sort button.active { color: var(--cp-fg); background: var(--cp-bg-elev-2); }
.repos__list {
  flex: 1; min-height: 0; overflow-y: auto;
  padding: 8px 0;
}

.repo {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  column-gap: 10px;
  padding: 10px 16px 10px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  border-bottom: 1px solid var(--cp-border-muted);
  transition: background 120ms, border-color 120ms;
}
.repo:hover { background: var(--cp-bg-elev-2); }
.repo.active {
  background: linear-gradient(90deg, color-mix(in oklab, var(--cp-accent) 14%, transparent) 0%, var(--cp-bg-elev-2) 60%);
  border-left-color: var(--cp-accent);
  box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--cp-accent) 24%, transparent);
}
.repo.active .repo__icon {
  background: color-mix(in oklab, var(--cp-accent) 18%, var(--cp-bg-inset));
  border-color: color-mix(in oklab, var(--cp-accent) 45%, var(--cp-border));
  color: var(--cp-accent);
}
.repo.active .repo__name { color: var(--cp-fg); }
.repo.active .repo__count { color: var(--cp-fg); }
.repo__icon {
  width: 24px; height: 24px;
  border-radius: 4px;
  background: var(--cp-bg-inset);
  border: 1px solid var(--cp-border);
  display: flex; align-items: center; justify-content: center;
  color: var(--cp-fg-2);
}
.repo__main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.repo__name {
  font-family: var(--cp-font-mono); font-size: 13px;
  color: var(--cp-fg); letter-spacing: -0.02em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.repo__sub {
  font-family: var(--cp-font-mono); font-size: 11px;
  color: var(--cp-fg-3); letter-spacing: -0.02em;
}
.repo__rhs {
  display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
}
.repo__count {
  font-family: var(--cp-font-mono); font-size: 16px; font-weight: 500;
  letter-spacing: -0.04em; line-height: 1;
  color: var(--cp-fg);
  font-variant-numeric: tabular-nums;
}
.repo__count.zero { color: var(--cp-fg-3); }
.repo__sevbar {
  display: flex; gap: 2px; height: 3px; width: 60px;
  border-radius: 999px; overflow: hidden;
  background: var(--cp-bg-inset);
}
.repo__sevbar span { height: 100%; }
.repo__sevbar .crit { background: var(--cp-critical); }
.repo__sevbar .high { background: var(--cp-high); }
.repo__sevbar .med  { background: var(--cp-medium); }
.repo__sevbar .low  { background: var(--cp-low); }

/* ===== Main pane ===== */
.pane {
  min-height: 0;
  display: flex; flex-direction: column;
  position: relative;
}
.pane__hd {
  padding: 24px 28px 18px;
  border-bottom: 1px solid var(--cp-border);
  display: flex; flex-direction: column; gap: 16px;
}
.pane__top {
  display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap;
}
.pane__lhs { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.pane__crumb {
  font-family: var(--cp-font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--cp-fg-3);
  display: flex; align-items: center; gap: 6px;
}
.pane__crumb a { color: var(--cp-fg-3); text-decoration: none; }
.pane__crumb a:hover { color: var(--cp-fg); }
.pane__crumb .accent { color: var(--cp-accent); }
.pane__title {
  font-family: var(--cp-font-sans);
  font-size: 28px; font-weight: 600;
  letter-spacing: -0.035em; line-height: 1.1;
  color: var(--cp-fg);
  margin: 0;
}
.pane__sub {
  font-size: 13px; color: var(--cp-fg-2); line-height: 1.55;
  margin-top: 2px;
}
.pane__sub .code-inline {
  font-family: var(--cp-font-mono); font-size: 11.5px;
  background: var(--cp-bg-inset); padding: 1px 5px; border-radius: 3px;
  border: 1px solid var(--cp-border); color: var(--cp-accent-fg);
  letter-spacing: -0.02em;
}
.pane__rhs { display: flex; gap: 8px; align-items: center; }

/* ===== Stats row ===== */
.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.stat {
  background: var(--cp-bg-elev-1); border: 1px solid var(--cp-border);
  border-radius: var(--cp-radius-md); padding: 12px 14px;
  display: flex; flex-direction: column; gap: 4px;
  min-height: 78px;
}
.stat__lbl {
  font-family: var(--cp-font-mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--cp-fg-3);
}
.stat__num {
  font-family: var(--cp-font-mono); font-size: 28px;
  font-weight: 500; letter-spacing: -0.04em; line-height: 1;
  font-variant-numeric: tabular-nums;
}

/* ===== Toolbar ===== */
.toolbar {
  padding: 14px 28px;
  border-bottom: 1px solid var(--cp-border);
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px; flex-wrap: wrap;
}
.toolbar__lhs { display: flex; gap: 6px; flex-wrap: wrap; }
.toolbar__rhs { display: flex; gap: 8px; align-items: center; }
.toolbar__sort {
  font-family: var(--cp-font-mono); font-size: 12px;
  color: var(--cp-fg-3); letter-spacing: -0.02em;
}

/* ===== Chips ===== */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: var(--cp-radius-pill);
  background: var(--cp-bg-elev-1); border: 1px solid var(--cp-border-strong);
  color: var(--cp-fg-2); font-family: var(--cp-font-sans); font-size: 12px;
  letter-spacing: -0.01em; cursor: pointer;
  transition: all 120ms;
}
.chip:hover { color: var(--cp-fg); border-color: var(--cp-fg-3); }
.chip.active { background: var(--cp-accent-soft); border-color: var(--cp-accent); color: var(--cp-accent-fg); }
.chip__count { font-family: var(--cp-font-mono); font-size: 11px; color: var(--cp-fg-3); letter-spacing: -0.02em; }
.chip.active .chip__count { color: var(--cp-accent-fg); }

/* ===== Violations list ===== */
.list {
  flex: 1; min-height: 0;
  overflow-y: auto;
  padding: 18px 28px 96px;
}
.list__inner { display: flex; flex-direction: column; gap: 10px; }

.v {
  background: var(--cp-bg-elev-1);
  border: 1px solid var(--cp-border);
  border-radius: var(--cp-radius-md);
  overflow: hidden;
  transition: border-color 120ms;
}
.v:hover { border-color: var(--cp-border-strong); }
.v.selected { border-color: var(--cp-accent); }
.v.collapsed .v__body { display: none; }

.v__hd {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--cp-border-muted);
  cursor: pointer;
}
.v.collapsed .v__hd { border-bottom: 0; }
.v__cb {
  width: 14px; height: 14px;
  accent-color: var(--cp-accent);
  flex-shrink: 0;
  margin-top: 3px;
}
.v__head-main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 3px;
}
.v__head-rule {
  font-family: var(--cp-font-sans); font-size: 13.5px;
  color: var(--cp-fg); line-height: 1.4;
  letter-spacing: -0.01em;
}
.v__head-meta {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--cp-font-mono); font-size: 11.5px;
  color: var(--cp-fg-3); letter-spacing: -0.02em;
}
.v__dot { color: var(--cp-fg-4); }
.v__file {
  color: var(--cp-fg-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 50%;
}
.v__file .ln { color: var(--cp-fg-3); }
.v__std { color: var(--cp-fg-3); }
.v__chevron {
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  color: var(--cp-fg-3); font-family: var(--cp-font-mono); font-size: 10px;
  transition: transform 120ms;
  margin-top: 2px;
}
.v.collapsed .v__chevron { transform: rotate(-90deg); }

.v__body {
  padding: 12px 16px;
  display: flex; flex-direction: column; gap: 6px;
  font-size: 13px;
}
.v__lead {
  display: inline-block; min-width: 48px;
  font-family: var(--cp-font-mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--cp-fg-3); margin-right: 8px;
}
.v__rule  { color: var(--cp-fg); line-height: 1.55; }
.v__found { color: var(--cp-fg-2); line-height: 1.55; }
.v__fix   { color: var(--cp-success-fg); line-height: 1.55; }
.v__fix .v__lead { color: var(--cp-success); }

/* ===== Severity badge ===== */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: var(--cp-radius-pill);
  font-family: var(--cp-font-mono); font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.04em;
  flex-shrink: 0;
}
.badge__dot { width: 5px; height: 5px; border-radius: 999px; }
.badge--critical { background: var(--cp-critical-bg); color: var(--cp-critical-fg); }
.badge--critical .badge__dot { background: var(--cp-critical); }
.badge--high     { background: var(--cp-high-bg);     color: var(--cp-high-fg); }
.badge--high     .badge__dot { background: var(--cp-high); }
.badge--medium   { background: var(--cp-medium-bg);   color: var(--cp-medium-fg); }
.badge--medium   .badge__dot { background: var(--cp-medium); }
.badge--low      { background: var(--cp-low-bg);      color: var(--cp-low-fg); }
.badge--low      .badge__dot { background: var(--cp-low); }

/* ===== Code snippet ===== */
.code {
  background: var(--cp-bg-inset);
  border: 1px solid var(--cp-border);
  border-radius: var(--cp-radius-sm);
  font-family: var(--cp-font-mono); font-size: 12px;
  letter-spacing: -0.02em;
  margin-top: 4px; overflow: hidden;
}
.code__hd {
  background: var(--cp-bg-elev-2);
  border-bottom: 1px solid var(--cp-border);
  padding: 6px 12px;
  font-size: 11px; color: var(--cp-fg-3);
  display: flex; justify-content: space-between;
}
.code__hd .meta { color: var(--cp-fg-4); }
.code__body { padding: 8px 0; }
.code__ln { display: flex; padding: 0 12px; line-height: 1.65; }
.code__ln.hl {
  background: var(--cp-accent-soft);
  box-shadow: inset 3px 0 0 var(--cp-accent);
  padding-left: 9px;
}
.code__nu {
  color: var(--cp-fg-4);
  min-width: 32px; text-align: right; padding-right: 12px;
  user-select: none;
}
.code__line { color: var(--cp-fg-2); white-space: pre; }

/* ===== Empty state ===== */
.empty {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 64px 24px;
  text-align: center;
  gap: 10px;
}
.empty__icon {
  width: 56px; height: 56px;
  border: 1px solid var(--cp-border);
  border-radius: 8px;
  background: var(--cp-bg-elev-1);
  display: flex; align-items: center; justify-content: center;
  color: var(--cp-success);
  font-family: var(--cp-font-mono); font-size: 22px;
}
.empty h3 {
  font-family: var(--cp-font-sans);
  font-size: 18px; font-weight: 600; letter-spacing: -0.02em;
  margin: 8px 0 0;
}
.empty p {
  font-size: 13px; color: var(--cp-fg-2);
  max-width: 360px;
}
.empty .code-inline {
  font-family: var(--cp-font-mono); font-size: 12px;
  background: var(--cp-bg-inset); padding: 2px 6px; border-radius: 3px;
  border: 1px solid var(--cp-border); color: var(--cp-accent-fg);
  letter-spacing: -0.02em;
}

/* ===== Action bar ===== */
.actionbar {
  position: absolute; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 16px;
  background: var(--cp-bg-elev-3);
  border: 1px solid var(--cp-border-strong);
  border-radius: var(--cp-radius-md);
  padding: 8px 8px 8px 16px;
  box-shadow: var(--cp-shadow-lg);
  z-index: 20;
}
.actionbar__count { font-size: 13px; color: var(--cp-fg-2); }
.actionbar__count b { font-family: var(--cp-font-mono); color: var(--cp-fg); font-weight: 500; }
.actionbar__btns { display: flex; gap: 6px; }

/* ===== Toast ===== */
.toast {
  position: absolute; bottom: 84px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  display: flex; align-items: center; gap: 8px;
  background: var(--cp-bg-elev-3); border: 1px solid var(--cp-border-strong);
  padding: 10px 16px; border-radius: var(--cp-radius-md);
  box-shadow: var(--cp-shadow-md);
  font-size: 13px; color: var(--cp-fg);
  opacity: 0; pointer-events: none;
  transition: opacity 180ms, transform 180ms;
  z-index: 30;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast__dot {
  width: 6px; height: 6px; border-radius: 999px;
  background: var(--cp-success);
  box-shadow: 0 0 8px var(--cp-success);
}

/* ===== Run picker ===== */
.runpicker { position: relative; }
.runpicker__btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  background: var(--cp-bg-elev-1);
  border: 1px solid var(--cp-border-strong);
  border-radius: var(--cp-radius-sm);
  font-family: var(--cp-font-sans);
  cursor: pointer;
  color: var(--cp-fg);
  transition: border-color 120ms;
}
.runpicker__btn:hover { border-color: var(--cp-fg-3); }
.runpicker__lbl {
  font-family: var(--cp-font-mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--cp-fg-3);
}
.runpicker__val {
  font-family: var(--cp-font-mono); font-size: 12.5px;
  letter-spacing: -0.02em; color: var(--cp-fg);
}
.runpicker__tag {
  font-family: var(--cp-font-mono); font-size: 9.5px;
  text-transform: uppercase; letter-spacing: 0.06em;
  background: var(--cp-accent-soft); color: var(--cp-accent-fg);
  padding: 2px 6px; border-radius: 999px;
}
.runpicker__caret { color: var(--cp-fg-3); margin-left: 2px; font-size: 10px; }
.runpicker__menu {
  position: absolute; right: 0; top: calc(100% + 6px);
  min-width: 320px;
  background: var(--cp-bg-elev-3);
  border: 1px solid var(--cp-border-strong);
  border-radius: var(--cp-radius-md);
  box-shadow: var(--cp-shadow-lg);
  padding: 6px; z-index: 40;
  display: flex; flex-direction: column; gap: 2px;
}
.runpicker__menu-hd {
  font-family: var(--cp-font-mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--cp-fg-3);
  padding: 8px 10px 6px;
  border-bottom: 1px solid var(--cp-border-muted);
  margin-bottom: 4px;
}
.runpicker__item {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center; gap: 10px;
  padding: 8px 10px;
  background: transparent; border: 0;
  font-family: var(--cp-font-mono); font-size: 12px;
  letter-spacing: -0.02em; color: var(--cp-fg-2);
  border-radius: 4px;
  cursor: pointer; text-align: left;
  width: 100%;
}
.runpicker__item:hover { background: var(--cp-bg-elev-2); color: var(--cp-fg); }
.runpicker__item.active { background: var(--cp-bg-elev-2); color: var(--cp-fg); }
.runpicker__item .runpicker__when { color: var(--cp-fg); }
.runpicker__trigger {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--cp-fg-3);
  padding: 1px 6px; border: 1px solid var(--cp-border);
  border-radius: 3px;
}
.runpicker__total {
  font-variant-numeric: tabular-nums;
  color: var(--cp-fg-3); min-width: 28px; text-align: right;
}
.runpicker__item.active .runpicker__total { color: var(--cp-fg); }
.runpicker__item .runpicker__tag { font-size: 9px; padding: 1px 5px; }

/* ===== Scrollbars ===== */
.repos__list, .list { scrollbar-gutter: stable; }
</style>
</head>
<body class="cp-grid-bg">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script>
// Data is fetched from /api/dashboard at runtime.
window.CP_DATA = null;

// Try to fetch live data from the API; fall back to mock if unavailable
fetch('/api/dashboard')
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(data => { window.CP_DATA = data; })
  .catch(() => { window.CP_DATA = { repos: [], violationsByRepo: {} }; })
  .finally(() => {
    // Signal that data is ready (App component checks this)
    window.dispatchEvent(new Event('cp-data-ready'));
  });
</script>

<script type="text/babel">
// ===== Severity badge =====
function Badge({ severity }) {
  const sev = severity.toLowerCase();
  return (
    <span className={`badge badge--${sev}`}>
      <span className="badge__dot" />
      {severity}
    </span>
  );
}

// ===== Severity bar =====
function SevBar({ repo }) {
  const r = repo.runs[0];
  const total = r.critical + r.high + r.medium + r.low;
  if (total === 0) return <div className="repo__sevbar" />;
  const seg = (n, cls) => n > 0 ? <span key={cls} className={cls} style={{ flex: n }} /> : null;
  return (
    <div className="repo__sevbar">
      {seg(r.critical, "crit")}
      {seg(r.high, "high")}
      {seg(r.medium, "med")}
      {seg(r.low, "low")}
    </div>
  );
}

// ===== Repo row =====
function RepoRow({ repo, active, onClick }) {
  const r = repo.runs[0];
  return (
    <div className={`repo ${active ? "active" : ""}`} onClick={onClick}>
      <div className="repo__icon" aria-hidden="true">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M2 2.5A1.5 1.5 0 0 1 3.5 1h9A1.5 1.5 0 0 1 14 2.5V13a1 1 0 0 1-1 1H4a2 2 0 0 0-2 2V2.5z" stroke="currentColor" strokeWidth="1.2" strokeLinejoin="round"/>
          <path d="M4 12h9" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
        </svg>
      </div>
      <div className="repo__main">
        <div className="repo__name">{repo.name}</div>
        <div className="repo__sub"><span>{r.at}</span></div>
      </div>
      <div className="repo__rhs">
        <div className={`repo__count ${r.total === 0 ? "zero" : ""}`}>{r.total}</div>
        <SevBar repo={repo} />
      </div>
    </div>
  );
}

// ===== Repo sidebar =====
function RepoSidebar({ repos, activeId, onSelect }) {
  const [query, setQuery] = React.useState("");
  const [sort, setSort] = React.useState("violations");

  const filtered = repos.filter(r =>
    r.name.toLowerCase().includes(query.toLowerCase())
  );
  const sorted = [...filtered].sort((a, b) => {
    if (sort === "violations") return b.runs[0].total - a.runs[0].total;
    if (sort === "name") return a.name.localeCompare(b.name);
    if (sort === "recent") return (b.runs[0].ts || "").localeCompare(a.runs[0].ts || "");
    return 0;
  });

  return (
    <aside className="repos">
      <div className="repos__hd">
        <div className="repos__title">
          <h2>Repositories <span className="count">{repos.length}</span></h2>
        </div>
        <div className="repos__filter">
          <span style={{color:"var(--cp-fg-3)"}}>/</span>
          <input type="text" placeholder={"Filter repos\u2026"} value={query} onChange={e => setQuery(e.target.value)} />
          {query && <span className="x" onClick={() => setQuery("")}>{"\u00d7"}</span>}
        </div>
        <div className="repos__sort">
          <span style={{padding:"3px 0"}}>SORT</span>
          <button className={sort === "violations" ? "active" : ""} onClick={() => setSort("violations")}>violations</button>
          <button className={sort === "name" ? "active" : ""} onClick={() => setSort("name")}>name</button>
          <button className={sort === "recent" ? "active" : ""} onClick={() => setSort("recent")}>recent</button>
        </div>
      </div>
      <div className="repos__list">
        {sorted.map(r => (
          <RepoRow key={r.id} repo={r} active={activeId === r.id} onClick={() => onSelect(r.id)} />
        ))}
        {filtered.length === 0 && (
          <div style={{padding:"32px 16px",textAlign:"center",color:"var(--cp-fg-3)",fontSize:"12px",fontFamily:"var(--cp-font-mono)"}}>
            No repos match "{query}"
          </div>
        )}
      </div>
    </aside>
  );
}

// ===== Code snippet =====
function CodeSnippet({ snippet }) {
  if (!snippet) return null;
  const hl = new Set(snippet.highlight || []);
  const ext = snippet.path.split(".").pop() || "";
  return (
    <div className="code">
      <div className="code__hd">
        <span>{snippet.path}</span>
        <span className="meta">{ext}</span>
      </div>
      <div className="code__body">
        {snippet.lines.map((line, i) => {
          const ln = snippet.start + i;
          return (
            <div key={i} className={`code__ln ${hl.has(ln) ? "hl" : ""}`}>
              <span className="code__nu">{ln}</span>
              <span className="code__line">{line || "\u00A0"}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ===== Violation row =====
function Violation({ v, selected, expanded, onToggleSelect, onToggleExpand }) {
  return (
    <article className={`v ${selected ? "selected" : ""} ${expanded ? "" : "collapsed"}`}>
      <header className="v__hd" onClick={onToggleExpand}>
        <input
          type="checkbox" className="v__cb" checked={selected}
          onChange={(e) => { e.stopPropagation(); onToggleSelect(); }}
          onClick={(e) => e.stopPropagation()}
        />
        <Badge severity={v.severity} />
        <div className="v__head-main">
          <div className="v__head-rule">{v.rule}</div>
          <div className="v__head-meta">
            <span className="v__file">{v.file}<span className="ln">:{v.line}</span></span>
            <span className="v__dot">{"\u00b7"}</span>
            <span className="v__std">{v.standard}</span>
          </div>
        </div>
        <span className="v__chevron">{"\u25be"}</span>
      </header>
      <div className="v__body">
        <div className="v__found"><span className="v__lead">Found</span>{v.found}</div>
        <div className="v__fix"><span className="v__lead">Fix</span>{v.fix}</div>
        <CodeSnippet snippet={v.snippet} />
      </div>
    </article>
  );
}

// ===== Stats =====
function StatCards({ run }) {
  const items = [
    { key: "total",    label: "Total",    value: run.total,    color: "var(--cp-fg)" },
    { key: "critical", label: "Critical", value: run.critical, color: "var(--cp-critical)" },
    { key: "high",     label: "High",     value: run.high,     color: "var(--cp-high)" },
    { key: "medium",   label: "Medium",   value: run.medium,   color: "var(--cp-medium)" },
    { key: "low",      label: "Low",      value: run.low,      color: "var(--cp-low)" },
  ];
  return (
    <section className="stats">
      {items.map(it => (
        <div key={it.key} className="stat">
          <div className="stat__lbl">{it.label}</div>
          <div className="stat__num" style={{ color: it.color }}>{it.value}</div>
        </div>
      ))}
    </section>
  );
}

// ===== Filter chips =====
function FilterChips({ counts, active, onChange }) {
  const chips = [
    { id: null,       label: "All",      count: counts.total },
    { id: "Critical", label: "Critical", count: counts.critical },
    { id: "High",     label: "High",     count: counts.high },
    { id: "Medium",   label: "Medium",   count: counts.medium },
    { id: "Low",      label: "Low",      count: counts.low },
  ];
  return (
    <div className="toolbar__lhs">
      {chips.map(c => (
        <button key={c.id || "all"} className={`chip ${active === c.id ? "active" : ""}`} onClick={() => onChange(c.id)}>
          {c.label} <span className="chip__count">{c.count}</span>
        </button>
      ))}
    </div>
  );
}

// ===== Empty state =====
function EmptyState({ repo }) {
  return (
    <div className="empty">
      <div className="empty__icon">{"\u2713"}</div>
      <h3>No violations.</h3>
      <p>
        <b style={{color:"var(--cp-fg)",fontWeight:500}}>{repo.name}</b> is fully aligned with your standards as of {repo.runs[0].at}.
      </p>
      <p style={{marginTop:8}}>
        Run <span className="code-inline">/codeplaybook-audit</span> in your agent for a fresh scan.
      </p>
    </div>
  );
}

// ===== Action bar =====
function ActionBar({ count, onCopy, onDismiss, onClear }) {
  if (count === 0) return null;
  return (
    <div className="actionbar">
      <span className="actionbar__count"><b>{count}</b> selected</span>
      <div className="actionbar__btns">
        <button className="btn btn--ghost" onClick={onClear}>Clear</button>
        <button className="btn btn--ghost" onClick={onDismiss}>Dismiss</button>
        <button className="btn btn--primary" onClick={onCopy}>Copy fix prompt{count > 1 ? "s" : ""}</button>
      </div>
    </div>
  );
}

function Toast({ message, show }) {
  return (
    <div className={`toast ${show ? "show" : ""}`}>
      <span className="toast__dot" />
      {message}
    </div>
  );
}

// ===== Run picker =====
function RunPicker({ runs, activeRunId, onPick }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const active = runs.find(r => r.id === activeRunId) || runs[0];
  const isLatest = runs[0].id === active.id;

  React.useEffect(() => {
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, []);

  return (
    <div className="runpicker" ref={ref}>
      <button className="runpicker__btn" onClick={() => setOpen(o => !o)}>
        <span className="runpicker__lbl">Run</span>
        <span className="runpicker__val">{active.at}</span>
        {isLatest && <span className="runpicker__tag">latest</span>}
        <span className="runpicker__caret">{"\u25be"}</span>
      </button>
      {open && (
        <div className="runpicker__menu">
          <div className="runpicker__menu-hd">Audit history {"\u00b7"} {runs.length}</div>
          {runs.map((r, i) => (
            <button key={r.id} className={`runpicker__item ${r.id === active.id ? "active" : ""}`}
              onClick={() => { onPick(r.id); setOpen(false); }}>
              <span className="runpicker__when">{r.at}</span>
              <span className="runpicker__trigger">{r.trigger}</span>
              <span className="runpicker__total">{r.total}</span>
              {i === 0 && <span className="runpicker__tag">latest</span>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ===== List content helper =====
function ListContent({ counts, isLatest, run, repo, filtered, selected, expanded, toggleSelect, toggleExpand }) {
  if (counts.total === 0) {
    return <EmptyState repo={repo} />;
  }
  if (!isLatest) {
    return (
      <div className="empty">
        <h3>Historical run</h3>
        <p>This view shows the violation summary for {run.at}. Select the latest run to see per-violation details and fix prompts.</p>
      </div>
    );
  }
  if (filtered.length === 0) {
    return (
      <div className="empty">
        <h3>No violations match this filter.</h3>
        <p>Try a different severity or clear the filter.</p>
      </div>
    );
  }
  return (
    <div className="list__inner">
      {filtered.map(v => (
        <Violation key={v.id} v={v} selected={selected.has(v.id)} expanded={expanded.has(v.id)}
          onToggleSelect={() => toggleSelect(v.id)} onToggleExpand={() => toggleExpand(v.id)} />
      ))}
    </div>
  );
}

// ===== Main pane =====
function ViolationsPane({ repo, violations }) {
  const [filter, setFilter] = React.useState(null);
  const [selected, setSelected] = React.useState(new Set());
  const [expanded, setExpanded] = React.useState(new Set());
  const [toast, setToast] = React.useState({ show: false, msg: "" });
  const [runId, setRunId] = React.useState(repo.runs[0].id);

  React.useEffect(() => {
    setSelected(new Set());
    setFilter(null);
    setExpanded(new Set());
    setRunId(repo.runs[0].id);
  }, [repo.id]);

  const run = repo.runs.find(r => r.id === runId) || repo.runs[0];
  const isLatest = repo.runs[0].id === run.id;

  const counts = isLatest ? violations.reduce((acc, v) => {
    acc.total++;
    const sev = v.severity.toLowerCase();
    if (sev in acc) acc[sev]++;
    return acc;
  }, { total: 0, critical: 0, high: 0, medium: 0, low: 0 }) : {
    total: run.total, critical: run.critical, high: run.high, medium: run.medium, low: run.low,
  };
  const filtered = isLatest
    ? (filter ? violations.filter(v => v.severity === filter) : violations)
    : [];

  const toggleInSet = (setter, id) => {
    setter(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };
  const toggleSelect = (id) => toggleInSet(setSelected, id);
  const toggleExpand = (id) => toggleInSet(setExpanded, id);

  const showToast = (msg) => {
    setToast({ show: true, msg });
    setTimeout(() => setToast({ show: false, msg: "" }), 2000);
  };
  const onCopy = () => {
    const fixes = violations.filter(v => selected.has(v.id)).map(v => v.fix).filter(Boolean).join("\n\n");
    if (!fixes) return;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(fixes).then(() => {
        showToast(`Copied ${selected.size} fix prompt${selected.size === 1 ? "" : "s"}`);
      });
    } else {
      showToast("Clipboard not available");
    }
  };
  const onDismiss = () => {
    showToast(`Dismissed ${selected.size} violation${selected.size === 1 ? "" : "s"}`);
    setSelected(new Set());
  };
  const onClear = () => setSelected(new Set());

  return (
    <main className="pane">
      <div className="pane__hd">
        <div className="pane__top">
          <div className="pane__lhs">
            <div className="pane__crumb">
              <a href="#">Repositories</a>
              <span style={{color:"var(--cp-fg-4)"}}>/</span>
              <span className="accent">{repo.name}</span>
              <span style={{color:"var(--cp-fg-4)"}}>{"\u00b7"}</span>
              <span>Last run {repo.runs[0].at}</span>
            </div>
            <h1 className="pane__title">{repo.name}</h1>
            <p className="pane__sub">
              {counts.total === 0
                ? "Codebase is aligned with all standards."
                : <>{counts.total} open finding{counts.total === 1 ? "" : "s"} across {Object.values(counts).slice(1).filter(n => n > 0).length} severity tier{Object.values(counts).slice(1).filter(n => n > 0).length === 1 ? "" : "s"}.</>}
              {" \u00b7 Run "}<span className="code-inline">/codeplaybook-audit</span>{" for a fresh scan."}
            </p>
          </div>
          <div className="pane__rhs">
            <RunPicker runs={repo.runs} activeRunId={runId} onPick={setRunId} />
          </div>
        </div>
        <StatCards run={run} />
      </div>

      <div className="toolbar">
        <FilterChips counts={counts} active={filter} onChange={setFilter} />
        <div className="toolbar__rhs">
          <span className="toolbar__sort">
            {isLatest
              ? <>{filtered.length} of {counts.total} {"\u00b7"} sort by severity</>
              : <>Showing summary for {run.at} {"\u00b7"} select latest run for full details</>}
          </span>
        </div>
      </div>

      <div className="list">
        <ListContent
          counts={counts} isLatest={isLatest} run={run} repo={repo}
          filtered={filtered} selected={selected} expanded={expanded}
          toggleSelect={toggleSelect} toggleExpand={toggleExpand}
        />
      </div>

      <ActionBar count={selected.size} onCopy={onCopy} onDismiss={onDismiss} onClear={onClear} />
      <Toast message={toast.msg} show={toast.show} />
    </main>
  );
}

// ===== App =====
function App() {
  const [data, setData] = React.useState(window.CP_DATA);
  const [activeId, setActiveId] = React.useState(null);

  React.useEffect(() => {
    if (window.CP_DATA) {
      setData(window.CP_DATA);
      if (!activeId && window.CP_DATA.repos.length) setActiveId(window.CP_DATA.repos[0].id);
    } else {
      const onReady = () => {
        setData(window.CP_DATA);
        if (window.CP_DATA.repos.length) setActiveId(window.CP_DATA.repos[0].id);
      };
      window.addEventListener('cp-data-ready', onReady);
      return () => window.removeEventListener('cp-data-ready', onReady);
    }
  }, []);

  if (!data || !data.repos.length) {
    return (
      <div className="app">
        <div className="empty" style={{height:"100vh"}}>
          <div className="empty__icon">
            {data ? "\u2713" : "\u22ef"}
          </div>
          <h3>
            {data ? "No audit data yet." : "Loading\u2026"}
          </h3>
          {data && (
            <p>
              Run <span className="code-inline">codeplaybook audit</span> to generate your first report.
            </p>
          )}
        </div>
      </div>
    );
  }

  const repo = data.repos.find(r => r.id === activeId) || data.repos[0];
  const violations = data.violationsByRepo[activeId] || [];

  return (
    <div className="app">
      <div className="body">
        <RepoSidebar repos={data.repos} activeId={activeId} onSelect={setActiveId} />
        <ViolationsPane repo={repo} violations={violations} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
